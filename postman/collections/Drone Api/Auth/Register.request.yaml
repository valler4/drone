$kind: http-request
url: "{{baseUrl}}v1/register"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: name
      value: ""
    - type: text
      key: user_name
      value: ""
    - type: text
      key: email
      value: ""
    - type: text
      key: password
      value: ""
order: 2000
